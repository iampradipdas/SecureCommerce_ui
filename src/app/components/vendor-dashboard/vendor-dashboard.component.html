<div class="dashboard-container">
  <div class="dashboard-header">
    <h1>Vendor Dashboard</h1>
    <button class="btn btn-primary" [routerLink]="['/vendor/add-product']">Add New Product</button>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <div class="product-management">
    <table class="table" *ngIf="products.length > 0">
      <thead>
        <tr>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Rating</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products">
          <td>{{ product.name }}</td>
          <td>{{ product.categoryName }}</td>
          <td>{{ product.price | currency }}</td>
          <td>{{ product.stock }}</td>
          <td>{{ product.averageRating | number:'1.1-1' }} ({{ product.reviewCount }})</td>
          <td>
            <button class="btn btn-outline-secondary btn-sm me-2" [routerLink]="['/vendor/edit-product', product.id]">Edit</button>
            <button class="btn btn-outline-danger btn-sm" (click)="deleteProduct(product.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="products.length === 0 && !errorMessage" class="no-products">
      <p>You haven't added any products yet.</p>
      <button class="btn btn-secondary" [routerLink]="['/vendor/add-product']">Create your first product</button>
    </div>
  </div>
</div>
