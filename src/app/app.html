<header class="app-header">
  <div class="header-container">
    <div class="logo">
      <a routerLink="/">
        <svg class="logo-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2L5 8.66667V18.6667C5 27.2444 11.4 35.2 20 38C28.6 35.2 35 27.2444 35 18.6667V8.66667L20 2Z" fill="url(#logo-gradient)" />
          <path d="M14 14H16L17.5 22H25.5L27 16H18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="19" cy="27" r="2" fill="white" />
          <circle cx="24" cy="27" r="2" fill="white" />
          <defs>
            <linearGradient id="logo-gradient" x1="5" y1="2" x2="35" y2="38" gradientUnits="userSpaceOnUse">
              <stop stop-color="#007bff" />
              <stop offset="1" stop-color="#00d2ff" />
            </linearGradient>
          </defs>
        </svg>
        <span>SecureCommerce</span>
      </a>
    </div>
    <nav class="main-nav">
      <ul>
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
        <li *ngIf="isLoggedIn()"><a routerLink="/products" routerLinkActive="active">Products</a></li>
        <li *ngIf="isLoggedIn()"><a routerLink="/cart" routerLinkActive="active">Cart</a></li>
        <li *ngIf="isVendor()"><a routerLink="/vendor/dashboard" routerLinkActive="active">Vendor Dashboard</a></li>
        <li *ngIf="isVendor()"><a routerLink="/vendor/orders" routerLinkActive="active">Manage Orders</a></li>
        <li *ngIf="isVendor()"><a routerLink="/vendor/categories" routerLinkActive="active">Manage Categories</a></li>
      </ul>
    </nav>
    <div class="auth-buttons">
      <button (click)="themeService.toggleTheme()" class="theme-toggle" [title]="themeService.isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
        <span *ngIf="!themeService.isDark()">🌙</span>
        <span *ngIf="themeService.isDark()">☀️</span>
      </button>
      
      <ng-container *ngIf="!isLoggedIn()">
        <a routerLink="/login" class="btn btn-secondary">Login</a>
        <a routerLink="/register" class="btn btn-primary">Register</a>
      </ng-container>
      
      <ng-container *ngIf="isLoggedIn()">
        <span class="user-welcome">Welcome, {{ username() }}</span>
        <button (click)="logout()" class="btn btn-outline">Logout</button>
      </ng-container>
    </div>
  </div>
</header>

<main class="main-content">
  <router-outlet></router-outlet>
</main>

<footer class="app-footer">
  <div class="footer-container">
    <p>&copy; 2026 SecureCommerce. All rights reserved.</p>
  </div>
</footer>
