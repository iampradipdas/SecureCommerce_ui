<header class="app-header">
  <div class="header-container">
    <div class="logo">
      <a routerLink="/">SecureCommerce</a>
    </div>
    <nav class="main-nav">
      <ul>
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
        <li *ngIf="isLoggedIn()"><a routerLink="/products" routerLinkActive="active">Products</a></li>
        <li *ngIf="isLoggedIn()"><a routerLink="/cart" routerLinkActive="active">Cart</a></li>
        <li *ngIf="isVendor()"><a routerLink="/vendor/dashboard" routerLinkActive="active">Vendor Dashboard</a></li>
        <li *ngIf="isVendor()"><a routerLink="/vendor/categories" routerLinkActive="active">Manage Categories</a></li>
      </ul>
    </nav>
    <div class="auth-buttons">
      <ng-container *ngIf="!isLoggedIn()">
        <a routerLink="/login" class="btn btn-secondary">Login</a>
        <a routerLink="/register" class="btn btn-primary">Register</a>
      </ng-container>
      <ng-container *ngIf="isLoggedIn()">
        <span class="user-welcome">Welcome, {{ username() }}</span>
        <button (click)="logout()" class="btn btn-outline">Logout</button>
      </ng-container>
    </div>
  </div>
</header>

<main class="main-content">
  <router-outlet></router-outlet>
</main>

<footer class="app-footer">
  <div class="footer-container">
    <p>&copy; 2026 SecureCommerce. All rights reserved.</p>
  </div>
</footer>
